syntax = "proto3";
package shaledb.v1;

option java_package = "com.ryszardzmija.shaledb.v1";
option java_multiple_files = true;

message GetRequest {
  string key = 1;
}

message GetResponse {
  bytes value = 1;
  bool found = 2;
}

message PutRequest {
  string key = 1;
  bytes value = 2;
}

message PutResponse {
  bool updated = 1;
}

message DeleteRequest {
  string key = 1;
}

message DeleteResponse {
  bool found = 1;
}

service ShaleDB {
  rpc Get(GetRequest) returns (GetResponse);
  rpc Put(PutRequest) returns (PutResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}
